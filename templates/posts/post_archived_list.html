{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>Archived Posts</h2>
  <ul class="list-group">
    {% for post in posts %}
      <li class="list-group-item">
        <a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a> - {{ post.created_on }}
      </li>
    {% empty %}
      <li class="list-group-item">No archived posts found.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
