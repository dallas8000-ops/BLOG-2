{% extends 'base.html' %}

{% block title %}
    Post {{ post.id }}
{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0">
    <div class="card-body p-5">
      <h2 class="card-title mb-4 text-center fw-bold text-primary">{{ post.title }}</h2>
      <h5 class="card-subtitle mb-3 text-muted">{{ post.subtitle }}</h5>
      <p class="mb-3">{{ post.body }}</p>
      <p>Status: <span class="fw-bold">{{ post.status }}</span></p>
      <p>Author: <span class="fw-bold">{{ post.author }}</span></p>
      <p class="text-muted small">Created on: {{ post.created_on }}</p>
      <div class="d-flex justify-content-center mt-4">
        <a href="{% url 'post_edit' post.id %}" class="btn btn-warning me-2">Edit</a>
        <a href="{% url 'post_delete' post.id %}" class="btn btn-danger">Delete</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
