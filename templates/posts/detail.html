{% extends 'base.html' %}

{% block title %}
    Post {{ post.id }}
{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="card-title mb-3 text-center fw-bold text-primary">{{ post.title }}</h2>
          <h5 class="card-subtitle mb-4 text-muted text-center">{{ post.subtitle }}</h5>
          <div class="mb-4" style="font-size:1.15rem; line-height:1.7; color:#333;">{{ post.body }}</div>
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge bg-info text-dark">{{ post.status }}</span>
            <span class="text-muted small">By <b>{{ post.author }}</b> on {{ post.created_on|date:'M d, Y' }}</span>
          </div>
          <div class="d-flex justify-content-center gap-3 mt-4">
            <a href="{% url 'post_edit' post.id %}" class="btn btn-outline-primary px-4">Edit</a>
            <a href="{% url 'post_delete' post.id %}" class="btn btn-outline-danger px-4">Delete</a>
            <a href="{% url 'post_list' %}" class="btn btn-outline-secondary px-4">Back to Posts</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
