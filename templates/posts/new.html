{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}New Post | Barney Gilliom{% endblock %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-xl-8">
        <div class="post-editor-card shadow-lg">
          <div class="mb-4">
            <p class="text-info text-uppercase small letter-spacing mb-2">Post Editor</p>
            <h1 class="fw-bold mb-2">New Post</h1>
            <p class="text-secondary mb-0">Write something worth sharing.</p>
          </div>
          <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex flex-wrap gap-3 mt-4">
              <button type="submit" class="btn btn-info text-dark flex-fill">Publish</button>
              <a href="{% url 'post_list' %}" class="btn btn-outline-secondary flex-fill">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
