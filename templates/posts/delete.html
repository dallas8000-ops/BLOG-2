{% extends 'base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5 text-center">
          <h2 class="card-title mb-4 text-danger fw-bold">Delete Post</h2>
          <p class="mb-4">Are you sure you want to delete this post?</p>
          <form method="post" class="d-flex flex-column gap-3 align-items-center">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
            <a href="{% url 'post_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
