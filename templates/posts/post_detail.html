
{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h2 class="card-title fw-bold text-primary mb-2">{{ post.title }}</h2>
          <h5 class="card-subtitle mb-3 text-muted">{{ post.subtitle }}</h5>
          <p class="card-text fs-5">{{ post.body|linebreaks }}</p>
          <div class="d-flex justify-content-between align-items-center mt-4">
            <span class="badge bg-info text-dark">{{ post.status }}</span>
            <span class="text-muted">By {{ post.author }} on {{ post.created_on|date:'M d, Y' }}</span>
          </div>
          {% if user.is_authenticated and user == post.author %}
            <div class="mt-4">
              <a href="{% url 'post_edit' post.pk %}" class="btn btn-primary me-2">Edit</a>
              <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Delete</a>
            </div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
