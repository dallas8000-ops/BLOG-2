{% extends "base.html" %}
{% block title %}Logged Out{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0 text-center">
        <div class="card-body p-5">

    </div>
  </div>
</div>
{% endblock %}
