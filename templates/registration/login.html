{% extends 'base.html' %}
{% load static %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center align-items-center" style="min-height: 50vh;">
        <div class="col-md-6 col-lg-4">
            <div class="auth-card shadow-lg">
                <div class="card-body p-2">
                    <h2 class="card-title mb-4 text-center fw-bold text-info">Login</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-info w-100 mt-3">Login</button>
                    </form>

                    <div class="d-flex align-items-center my-4">
                        <hr class="flex-grow-1 border-secondary">
                        <span class="mx-3 text-secondary small">or continue with</span>
                        <hr class="flex-grow-1 border-secondary">
                    </div>

                    <div class="d-flex flex-column gap-2">
                        <a href="{% url 'github_login' %}" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-github fs-5"></i> Continue with GitHub
                        </a>
                        <a href="{% url 'google_login' %}" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.7 33.6 29.3 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21c10.9 0 20-8.1 20-21 0-1.4-.1-2.7-.4-4z"/><path fill="#FF3D00" d="m6.3 14.7 6.6 4.8C14.5 15.1 18.9 12 24 12c3.1 0 5.9 1.1 8.1 2.9l5.7-5.7C34.5 5.1 29.5 3 24 3c-7.6 0-14.2 4.3-17.7 11.7z"/><path fill="#4CAF50" d="M24 45c5.2 0 10-1.8 13.7-4.7l-6.3-5.3C29.3 36.4 26.8 37 24 37c-5.3 0-9.7-3.4-11.3-8H6.1l-.1.1C9.4 40.6 16.2 45 24 45z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.4-2.4 4.4-4.5 5.7l6.3 5.3C41.1 35.5 44 30.2 44 24c0-1.4-.1-2.7-.4-4z"/></svg>
                            Continue with Google
                        </a>
                    </div>

                    <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
