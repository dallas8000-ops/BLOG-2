{% extends 'base.html' %}
{% load static socialaccount %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center align-items-center" style="min-height: 50vh;">
        <div class="col-md-6 col-lg-4">
            <div class="auth-card shadow-lg">
                <div class="card-body p-2">
                    <h2 class="card-title mb-4 text-center fw-bold text-info">Login</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-info w-100 mt-3">Login</button>
                    </form>

                    <div class="d-flex align-items-center my-4">
                        <hr class="flex-grow-1 border-secondary">
                        <span class="mx-3 text-secondary small">or continue with</span>
                        <hr class="flex-grow-1 border-secondary">
                    </div>

                    <div class="d-flex flex-column gap-2">
                        <a href="{% provider_login_url 'github' %}" class="btn btn-outline-light d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-github fs-5"></i> Continue with GitHub
                        </a>
                    </div>

                    <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
