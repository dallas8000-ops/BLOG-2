{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #e0f7fa 0%, #80deea 100%);">
    <div class="row w-100 justify-content-center align-items-center" style="min-height: 50vh;">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-lg border-0" style="height: 50vh; display: flex; flex-direction: column; justify-content: center;">
                <div class="card-body p-5 d-flex flex-column justify-content-center">
                    <h2 class="card-title mb-4 text-center fw-bold text-primary">Login</h2>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" name="username" id="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                    </form>
                    <p class="mt-3 text-center">Don't have an account? <a href="{% url 'signup' %}" class="text-decoration-none">Sign up</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
