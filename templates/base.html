<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}My Blog{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>My Blog</h1>
        <nav>
            <a href="/">Home</a> |
            <a href="/about/">About</a> |
            <a href="/posts/">Posts</a> |
            <a href="/posts/archived/">Archived Posts</a> |
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}!</span> |
                <form action="/accounts/logout/" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" style="background:none;border:none;padding:0;margin:0;color:#0d6efd;text-decoration:underline;cursor:pointer;">Logout</button>
                </form> |
            {% else %}
                <a href="/accounts/login/">Login</a> |
                <a href="/accounts/signup/">Sign Up</a> |
            {% endif %}
            <a href="/admin/">Admin</a>
        </nav>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
